apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: ollama
data:
  OLLAMA_NUM_PARALLEL: "1"
  OLLAMA_NUM_THREADS: "6"       # set to your node's CPU core count
  OLLAMA_KEEP_ALIVE: "24h"      # keep model in RAM, avoids reload delay
  OLLAMA_MAX_LOADED_MODELS: "1" # only 1 model at a time on CPU
